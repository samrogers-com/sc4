{% extends 'base.html' %}

{% block title %}Non-Sport Trading Cards — Sam's Collectibles{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold text-amber-500 mb-2">Non-Sport Trading Cards</h1>
<p class="text-gray-400 mb-6">Sealed boxes, base sets, chase cards, and more from hundreds of franchises.</p>

<div id="cards-list-container">
    <div hx-get="{% url 'non_sports_cards:list_cards' %}"
         hx-trigger="load"
         hx-target="#cards-list-container"
         hx-swap="innerHTML"
         class="text-center py-12">
        <div class="htmx-indicator"></div>
        <p class="text-gray-400 mt-4">Loading collection...</p>
    </div>
</div>
{% endblock %}
