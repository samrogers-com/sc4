{% extends 'base.html' %}

{% block title %}Contact — Sam's Collectibles{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-amber-500 mb-6">Contact Us</h1>

    <div class="bg-gray-700 rounded-lg border border-gray-600 p-8">
        <form action="{% url 'contact' %}" method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="name" class="block text-sm font-medium text-gray-300 mb-1">Your Name</label>
                <input type="text" name="name" id="name" required
                       class="w-full px-4 py-2 bg-gray-800 border border-gray-600 rounded-lg text-gray-100 focus:border-amber-500 focus:outline-none">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Your Email</label>
                <input type="email" name="email" id="email" required
                       class="w-full px-4 py-2 bg-gray-800 border border-gray-600 rounded-lg text-gray-100 focus:border-amber-500 focus:outline-none">
            </div>

            <div>
                <label for="message" class="block text-sm font-medium text-gray-300 mb-1">Your Message</label>
                <textarea name="message" id="message" rows="5" required
                          class="w-full px-4 py-2 bg-gray-800 border border-gray-600 rounded-lg text-gray-100 focus:border-amber-500 focus:outline-none"></textarea>
            </div>

            <button type="submit"
                    class="w-full py-3 bg-amber-500 hover:bg-amber-400 text-gray-900 font-bold rounded-lg transition">
                Send Message
            </button>
        </form>
    </div>
</div>
{% endblock %}
